<h2>Argumento ad Ignorantiam</h2>

<p><strong>¿Qué es?</strong></p>

<p>
Consiste en afirmar que algo es verdadero
porque no se ha demostrado que es falso,
o viceversa.
</p>

<p><strong>Ejemplo:</strong></p>

<p>
"Los extraterrestres existen porque nadie
ha demostrado que no existan."
</p>
